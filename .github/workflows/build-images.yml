name: Build and Release

# Triggered on push to main whenever bin/claude-docker's IMAGE_VERSION changes.
# One push rebuilds all four images (base + java/node/python), creates the
# v<version> git tag, and cuts a GitHub Release.
#
# workflow_dispatch is an escape hatch for rebuilding at a given version
# without bumping (e.g. to recover from a transient build failure).

on:
  push:
    branches: [main]
    paths: ['bin/claude-docker']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 0.0.7). Must match IMAGE_VERSION in bin/claude-docker.'
        required: true
        type: string
      create_release:
        description: 'Also create the v<version> tag + GitHub Release'
        required: true
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/hansvd/claude-docker

jobs:
  detect-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      should_build: ${{ steps.ver.outputs.should_build }}
      should_release: ${{ steps.ver.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extract version and decide whether to build
        id: ver
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ver='${{ inputs.version }}'
            echo "version=${ver}" >> "$GITHUB_OUTPUT"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "should_release=${{ inputs.create_release }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          new=$(grep -E '^IMAGE_VERSION=' bin/claude-docker | head -1 | sed 's/.*="\(.*\)".*/\1/')
          old=$(git show HEAD~1:bin/claude-docker 2>/dev/null | grep -E '^IMAGE_VERSION=' | head -1 | sed 's/.*="\(.*\)".*/\1/' || true)
          if [ -z "$new" ]; then
            echo "::error::Could not extract IMAGE_VERSION from bin/claude-docker"
            exit 1
          fi
          echo "version=${new}" >> "$GITHUB_OUTPUT"
          if [ "$new" = "$old" ]; then
            echo "IMAGE_VERSION unchanged (${new}) — no build needed."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "IMAGE_VERSION changed: ${old:-<none>} -> ${new}"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build-base:
    needs: detect-version
    if: needs.detect-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}-base
          tags: |
            type=raw,value=${{ needs.detect-version.outputs.version }}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: images/base/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-stacks:
    needs: [detect-version, build-base]
    if: needs.detect-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        stack: [java, node, python]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.stack }}
          tags: |
            type=raw,value=${{ needs.detect-version.outputs.version }}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: images/${{ matrix.stack }}/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_TAG=${{ needs.detect-version.outputs.version }}

  release:
    needs: [detect-version, build-base, build-stacks]
    if: needs.detect-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create tag and GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.detect-version.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
