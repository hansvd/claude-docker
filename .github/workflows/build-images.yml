name: Build and Push Docker Images

# Image releases are decoupled from CLI releases. Each image has its own tag
# scheme:
#   image-base-v<ver>    → publishes ghcr.io/hansvd/claude-docker-base:<ver>
#   image-java-v<ver>    → publishes ghcr.io/hansvd/claude-docker-java:<ver>
#   image-node-v<ver>    → publishes ghcr.io/hansvd/claude-docker-node:<ver>
#   image-python-v<ver>  → publishes ghcr.io/hansvd/claude-docker-python:<ver>
#
# CLI releases (tag pattern `v*`) do NOT trigger this workflow — bump the
# IMAGE_VERSION_<STACK> constant in bin/claude-docker to ship a new image to
# users.

on:
  push:
    tags:
      - 'image-base-v*'
      - 'image-java-v*'
      - 'image-node-v*'
      - 'image-python-v*'
  workflow_dispatch:
    inputs:
      stack:
        description: 'Stack to build (base|java|node|python)'
        required: true
        type: choice
        options: [base, java, node, python]
      version:
        description: 'Version tag (e.g. 0.0.3)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/hansvd/claude-docker

jobs:
  build-base:
    if: >-
      ${{ startsWith(github.ref, 'refs/tags/image-base-v') ||
          (github.event_name == 'workflow_dispatch' && inputs.stack == 'base') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#image-base-v}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}-base
          tags: |
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: images/base/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-stack:
    if: >-
      ${{ startsWith(github.ref, 'refs/tags/image-java-v') ||
          startsWith(github.ref, 'refs/tags/image-node-v') ||
          startsWith(github.ref, 'refs/tags/image-python-v') ||
          (github.event_name == 'workflow_dispatch' && inputs.stack != 'base') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract stack and version
        id: parse
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "stack=${{ inputs.stack }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # image-java-v0.0.3  →  stack=java, version=0.0.3
            ref="${GITHUB_REF_NAME}"
            stack="${ref#image-}"
            stack="${stack%%-v*}"
            version="${ref#image-${stack}-v}"
            echo "stack=${stack}" >> "$GITHUB_OUTPUT"
            echo "version=${version}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ steps.parse.outputs.stack }}
          tags: |
            type=raw,value=${{ steps.parse.outputs.version }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: images/${{ steps.parse.outputs.stack }}/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_TAG=latest
